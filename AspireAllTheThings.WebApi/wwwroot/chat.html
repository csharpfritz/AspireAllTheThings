<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspire AI Chat — Powered by GitHub Models</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 2px solid #512bd4;
            box-shadow: 0 2px 10px rgba(81, 43, 212, 0.3);
        }

        header h1 {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 600;
        }

        header p {
            color: #b8b8b8;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 80%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .message-content {
            background: rgba(255, 255, 255, 0.08);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #512bd4;
            color: #fff;
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .error-message {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.4);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            text-align: center;
        }

        .loading {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #512bd4;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        #input-container {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-top: 2px solid rgba(81, 43, 212, 0.4);
        }

        #input-form {
            display: flex;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
        }

        #message-input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border: 2px solid rgba(81, 43, 212, 0.4);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        #message-input:focus {
            border-color: #512bd4;
            background: rgba(255, 255, 255, 0.12);
        }

        #send-button {
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, #512bd4 0%, #6b3fd4 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(81, 43, 212, 0.4);
        }

        #send-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #6b3fd4 0%, #7e4fd4 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(81, 43, 212, 0.6);
        }

        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar styling */
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }

        #chat-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: rgba(81, 43, 212, 0.6);
            border-radius: 4px;
        }

        #chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(81, 43, 212, 0.8);
        }

        /* Markdown content styling */
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin: 0.5em 0 0.3em;
        }
        .message-content h1 { font-size: 1.4em; }
        .message-content h2 { font-size: 1.25em; }
        .message-content h3 { font-size: 1.1em; }
        .message-content p { margin: 0.4em 0; }
        .message-content ul, .message-content ol {
            margin: 0.4em 0;
            padding-left: 1.5em;
        }
        .message-content li { margin: 0.2em 0; }
        .message-content code {
            background: rgba(0,0,0,0.3);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .message-content pre {
            background: rgba(0,0,0,0.3);
            padding: 0.8em;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .message-content pre code {
            background: none;
            padding: 0;
        }
        .message-content strong { font-weight: 700; }
        .message-content a { color: #a78bfa; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>🤖 Aspire AI Chat</h1>
        <p>Powered by GitHub Models + .NET Aspire</p>
    </header>

    <div id="chat-container">
        <div class="message assistant">
            <div class="message-avatar">AI</div>
            <div class="message-content">
                👋 Hello! I'm powered by GitHub Models via .NET Aspire. Ask me anything about .NET, Aspire, or just chat!
            </div>
        </div>
    </div>

    <div id="input-container">
        <form id="input-form">
            <input 
                type="text" 
                id="message-input" 
                placeholder="Type your message..." 
                autocomplete="off"
                required
            />
            <button type="submit" id="send-button">Send</button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const inputForm = document.getElementById('input-form');

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? 'U' : 'AI';

            const content = document.createElement('div');
            content.className = 'message-content';
            if (isUser) {
                content.textContent = text;
            } else {
                content.innerHTML = marked.parse(text);
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addLoadingIndicator() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'AI';

            const content = document.createElement('div');
            content.className = 'message-content loading';
            content.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

            loadingDiv.appendChild(avatar);
            loadingDiv.appendChild(content);
            chatContainer.appendChild(loadingDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoadingIndicator() {
            const loading = document.getElementById('loading-indicator');
            if (loading) {
                loading.remove();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = `⚠️ ${message}`;
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage(message) {
            // Add user message to chat
            addMessage(message, true);

            // Clear input and disable form
            messageInput.value = '';
            sendButton.disabled = true;
            messageInput.disabled = true;

            // Show loading indicator
            addLoadingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                removeLoadingIndicator();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to get response from AI');
                }

                const data = await response.json();
                addMessage(data.response, false);

            } catch (error) {
                removeLoadingIndicator();
                showError(error.message || 'Failed to connect to AI service. Make sure Part 6 is enabled in the AppHost.');
            } finally {
                // Re-enable form
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        inputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (message) {
                sendMessage(message);
            }
        });

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
